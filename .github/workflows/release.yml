name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf mewn-${{ github.ref_name }}-${{ matrix.target }}.tar.gz mewn
          shasum -a 256 mewn-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > mewn-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: mewn-${{ github.ref_name }}-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/mewn-*.tar.gz
            target/${{ matrix.target }}/release/mewn-*.tar.gz.sha256

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            mewn-*/mewn-*.tar.gz
            mewn-*/mewn-*.tar.gz.sha256
          generate_release_notes: true
