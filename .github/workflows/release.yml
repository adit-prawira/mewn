name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf mewn-${{ github.ref_name }}-${{ matrix.target }}.tar.gz mewn
          shasum -a 256 mewn-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > mewn-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: mewn-${{ github.ref_name }}-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/mewn-*.tar.gz
            target/${{ matrix.target }}/release/mewn-*.tar.gz.sha256

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            mewn-*/mewn-*.tar.gz
            mewn-*/mewn-*.tar.gz.sha256
          generate_release_notes: true

  update-formula:
    name: Update formula SHA256
    runs-on: ubuntu-latest
    needs: [github-release]
    permissions:
      contents: write
    steps:
      - name: Derive branch from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "branch=release/$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.branch }}

      - name: Download SHA256 files
        run: |
          curl -fsSL "https://github.com/adit-prawira/mewn/releases/download/$GITHUB_REF_NAME/mewn-$GITHUB_REF_NAME-aarch64-apple-darwin.tar.gz.sha256" -o arm64.sha256
          curl -fsSL "https://github.com/adit-prawira/mewn/releases/download/$GITHUB_REF_NAME/mewn-$GITHUB_REF_NAME-x86_64-apple-darwin.tar.gz.sha256" -o x86_64.sha256

      - name: Replace placeholders
        run: |
          SHA_ARM64=$(cut -d' ' -f1 arm64.sha256)
          SHA_X86_64=$(cut -d' ' -f1 x86_64.sha256)
          sed -i "s/PLACEHOLDER_ARM64/$SHA_ARM64/" Formula/mewn.rb
          sed -i "s/PLACEHOLDER_X86_64/$SHA_X86_64/" Formula/mewn.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mewn.rb
          git diff --cached --quiet || git commit -m "chore(formula): update SHA256 for $GITHUB_REF_NAME"
          git push origin ${{ steps.meta.outputs.branch }}
